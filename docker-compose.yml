services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: rag_mvp_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
    container_name: rag_mvp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
