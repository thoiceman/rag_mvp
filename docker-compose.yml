services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag_mvp_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "8000"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rag_mvp_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge
